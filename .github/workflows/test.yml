name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        nim-version: ['version-2-0', 'devel']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache libSQL build
        uses: actions/cache@v4
        id: cache-libsql
        with:
          path: /usr/local/lib/liblibsql.so
          key: libsql-${{ runner.os }}-${{ hashFiles('/tmp/libsql-c/Cargo.lock') }}
      
      - name: Setup Nim
        uses: alaviss/setup-nim@0.1.1
        with:
          path: 'nim'
          version: ${{ matrix.nim-version }}
      
      - name: Install Rust (if cache miss)
        if: steps.cache-libsql.outputs.cache-hit != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
      
      - name: Build libSQL C library (if cache miss)
        if: steps.cache-libsql.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/tursodatabase/libsql-c.git /tmp/libsql-c
          cd /tmp/libsql-c
          cargo build --release
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo cp target/release/liblibsql.so /usr/local/lib/
          sudo cp libsql.h /usr/local/include/
          sudo ldconfig
      
      - name: Update library cache
        run: sudo ldconfig
      
      - name: Verify installation
        run: |
          echo "=== Library files ==="
          ls -la /usr/local/lib/liblibsql* || true
          echo "=== ldconfig cache ==="
          ldconfig -p | grep libsql || true
          echo "=== Library dependencies ==="
          ldd /usr/local/lib/liblibsql.so || true
          echo "=== Symbol check ==="
          nm -D /usr/local/lib/liblibsql.so | grep -E "(libsql_setup|libsql_database_init)" || true
          echo "=== File type ==="
          file /usr/local/lib/liblibsql.so || true
      
      - name: Debug structure sizes
        run: |
          cat > /tmp/check_sizes.c << 'CEOF'
          #include <stdio.h>
          #include <stdbool.h>
          #include <stdint.h>
          #include <stddef.h>
          typedef enum { A=0, B } cypher_t;
          typedef struct {
            const char *url;
            const char *path;
            const char *auth_token;
            const char *encryption_key;
            uint64_t sync_interval;
            cypher_t cypher;
            bool disable_read_your_writes;
            bool webpki;
            bool synced;
            bool disable_safety_assert;
            const char *namespace;
          } desc_t;
          int main() {
            printf("C: sizeof(cypher_t) = %zu\n", sizeof(cypher_t));
            printf("C: sizeof(bool) = %zu\n", sizeof(bool));
            printf("C: sizeof(desc_t) = %zu\n", sizeof(desc_t));
            printf("C: offsetof(cypher) = %zu\n", offsetof(desc_t, cypher));
            printf("C: offsetof(disable_read_your_writes) = %zu\n", offsetof(desc_t, disable_read_your_writes));
            printf("C: offsetof(namespace) = %zu\n", offsetof(desc_t, namespace));
            return 0;
          }
          CEOF
          gcc /tmp/check_sizes.c -o /tmp/check_sizes && /tmp/check_sizes
          
          cat > /tmp/check_offsets.nim << 'NIMEOF'
          import std/stddefects
          type
            libsql_cypher_t {.size: sizeof(cint).} = enum
              A = 0
              B
            libsql_database_desc_t = object
              url: cstring
              path: cstring
              auth_token: cstring
              encryption_key: cstring
              sync_interval: uint64
              cypher: libsql_cypher_t
              disable_read_your_writes: bool
              webpki: bool
              synced: bool
              disable_safety_assert: bool
              namespace: cstring
          let d = libsql_database_desc_t()
          echo "Nim: sizeof(libsql_cypher_t) = ", sizeof(libsql_cypher_t)
          echo "Nim: sizeof(bool) = ", sizeof(bool)
          echo "Nim: sizeof(desc_t) = ", sizeof(libsql_database_desc_t)
          echo "Nim: offsetof(cypher) = ", cast[int](addr d.cypher) - cast[int](addr d)
          echo "Nim: offsetof(disable_read_your_writes) = ", cast[int](addr d.disable_read_your_writes) - cast[int](addr d)
          echo "Nim: offsetof(namespace) = ", cast[int](addr d.namespace) - cast[int](addr d)
          NIMEOF
          nim c -r /tmp/check_offsets.nim
      
      - name: Run tests
        run: LD_LIBRARY_PATH=/usr/local/lib nimble test
      
      - name: Check test binary linking
        run: ldd tests/test_libsql || true
      
      - name: Build examples
        run: |
          nim c --passL:"/usr/local/lib/liblibsql.so" \
                --passL:"-Wl,-rpath,/usr/local/lib" \
                -o:examples/basic_example \
                examples/basic_example.nim
          nim c --passL:"/usr/local/lib/liblibsql.so" \
                --passL:"-Wl,-rpath,/usr/local/lib" \
                -o:examples/memory_db_example \
                examples/memory_db_example.nim
          
      - name: Test memory example first
        run: |
          echo "Testing memory example (should work):"
          LD_LIBRARY_PATH=/usr/local/lib ./examples/memory_db_example
          echo ""
          echo "Testing basic example with file db (may crash):"
          LD_LIBRARY_PATH=/usr/local/lib ./examples/basic_example || true
